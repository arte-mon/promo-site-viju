<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Промо | УБЕРУ</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/hero.css" />
  </head>
  <body>
    <main class="main">
      <section class="hero">
        <div class="container">
          <!-- Контейнер с карточками -->
          <div class="cards-wrapper">
            <!-- Левая карточка -->
            <div class="card card-left">
              <nav class="menu">
                <a href="#" class="menu-item">Как помочь?</a>
                <a href="#" class="menu-item">Зал славы</a>
                <a href="#" class="menu-item">Сообщество</a>
              </nav>

              <h1 class="main-title">
                Стань чьими-то глазами<br />прямо сейчас
              </h1>

              <button class="btn">Скачать приложение</button>
            </div>

            <!-- Правая карточка -->
            <div class="card card-right">
              <h2 class="side-title">Я хочу<br />помогать</h2>
            </div>
          </div>

          <!-- Сова отдельно справа -->
          <div class="owl-container">
            <!-- ЗАМЕНИТЕ src НА ПУТЬ К ВАШЕЙ КАРТИНКЕ С СОВОЙ -->
            <img src="assets/img/owl.png" alt="Зеленая сова" class="owl-img" />
          </div>
        </div>
      </section>

      <section class="outro">
        <div class="container"></div>
      </section>
    </main>
    <script type="module" src="js/script.js"></script>
  </body>
</html>
